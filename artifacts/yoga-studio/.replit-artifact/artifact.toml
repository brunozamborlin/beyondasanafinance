kind = "web"
previewPath = "/"
title = "Yoga Studio Finance"
version = "1.0.0"
id = "artifacts/yoga-studio"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24426

[services.development]
run = "pnpm --filter @workspace/yoga-studio run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/yoga-studio", "run", "build" ]
publicDir = "artifacts/yoga-studio/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24426"
BASE_PATH = "/"
